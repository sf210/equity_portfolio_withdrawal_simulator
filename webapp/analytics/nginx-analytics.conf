# Password-protected analytics location for the Monte Carlo site.
#
# Add this location block INSIDE the existing `server { ... }` block that
# certbot set up for port 443 in /etc/nginx/sites-available/montecarlo (i.e.
# alongside the other `location` blocks), then `sudo nginx -t && sudo systemctl
# reload nginx`. Create the password file first (see webapp/ANALYTICS.md):
#   sudo htpasswd -c /etc/nginx/.htpasswd-analytics <username>

    location /analytics/ {
        alias /var/www/analytics/;
        index index.html;

        auth_basic "Site analytics";
        auth_basic_user_file /etc/nginx/.htpasswd-analytics;

        # The report embeds visitor data; never let it be cached by proxies.
        add_header Cache-Control "no-store" always;
    }
