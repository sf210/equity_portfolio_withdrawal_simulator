# nginx reverse-proxy site for the Monte Carlo web app.
# Install:  sudo cp webapp/deploy/nginx-montecarlo.conf \
#               /etc/nginx/sites-available/montecarlo
#           sudo ln -s /etc/nginx/sites-available/montecarlo \
#               /etc/nginx/sites-enabled/montecarlo
#           sudo nginx -t && sudo systemctl reload nginx
#
# Replace example.com with your domain. Run certbot (see webapp/DEPLOY.md) to
# obtain the TLS certificate and let it rewrite/extend the 443 server block.

# Per-IP request rate limit as a first line of defence (the app rate-limits too).
limit_req_zone $binary_remote_addr zone=mc_limit:10m rate=20r/m;

server {
    listen 80;
    listen [::]:80;
    server_name example.com www.example.com;

    # Let certbot serve the ACME challenge, redirect everything else to HTTPS.
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name example.com www.example.com;

    # certbot fills these in (paths shown for reference):
    # ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;

    # Cap request body (the form is tiny) and apply the rate limit with a burst.
    client_max_body_size 64k;
    limit_req zone=mc_limit burst=10 nodelay;

    # Basic security headers.
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location = /healthz {
        proxy_pass http://127.0.0.1:8000/healthz;
        access_log off;
    }
}
