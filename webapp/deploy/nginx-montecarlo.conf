# nginx reverse-proxy site for the Monte Carlo web app.
# Install:  sudo cp webapp/deploy/nginx-montecarlo.conf \
#               /etc/nginx/sites-available/montecarlo
#           sudo ln -s /etc/nginx/sites-available/montecarlo \
#               /etc/nginx/sites-enabled/montecarlo
#           sudo nginx -t && sudo systemctl reload nginx
#
# This ships as HTTP-only on purpose. Replace example.com with your domain, then
# run `certbot --nginx` (see webapp/DEPLOY.md): it adds the `listen 443 ssl`
# block, the certificate paths, and the HTTP->HTTPS redirect for you. Shipping a
# pre-baked 443 block would fail `nginx -t` (an ssl listener with no certificate)
# before the cert exists.

# Per-IP request rate limit as a first line of defence (the app rate-limits too).
limit_req_zone $binary_remote_addr zone=mc_limit:10m rate=20r/m;

server {
    listen 80;
    listen [::]:80;
    server_name example.com www.example.com;

    # Cap request body (the form is tiny) and apply the rate limit with a burst.
    client_max_body_size 64k;
    limit_req zone=mc_limit burst=10 nodelay;

    # Basic security headers.
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location = /healthz {
        proxy_pass http://127.0.0.1:8000/healthz;
        access_log off;
    }
}
